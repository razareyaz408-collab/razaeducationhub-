<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raza AI Voice Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎤 Raza AI Voice Pro</h1>

<p class="subtitle">
Professional AI Text To Speech Tool
</p>

<textarea
id="text"
placeholder="Type your text here..."
></textarea>

<p id="count">0 Characters</p>

<label>Select Voice</label>

<select id="voiceSelect"></select>

<div class="buttons">

<button onclick="speakText()">
🎙️ Generate
</button>

<button onclick="clearText()">
🗑️ Clear
</button>

</div>

<div class="buttons">

<button onclick="pauseVoice()">
⏸ Pause
</button>

<button onclick="resumeVoice()">
▶ Resume
</button>

<button onclick="stopVoice()">
⏹ Stop
</button>

</div>
  
</div>

<script src="script.js"></script>

</body>
</html>
