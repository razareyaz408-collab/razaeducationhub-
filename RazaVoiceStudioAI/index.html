<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raza Voice Studio AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#2563EB,#7C3AED);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{

width:100%;
max-width:700px;

background:#ffffff;

border-radius:25px;

padding:30px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

font-size:42px;

text-align:center;

}

h1{

text-align:center;

margin-top:10px;

font-size:32px;

color:#222;

}

.tag{

text-align:center;

color:#666;

margin-top:8px;

margin-bottom:30px;

font-size:18px;

}

.hero{

background:linear-gradient(90deg,#2563EB,#06B6D4);

color:white;

padding:25px;

border-radius:20px;

text-align:center;

}

.hero h2{

font-size:28px;

margin-bottom:10px;

}

.hero p{

font-size:18px;

line-height:1.6;

}

.start{

margin-top:25px;

text-align:center;

}

.start button{

background:#7C3AED;

color:white;

border:none;

padding:15px 35px;

font-size:20px;

border-radius:15px;

cursor:pointer;

}

.start button:hover{

background:#5B21B6;

}

textarea:focus{
border-color:#7C3AED;
box-shadow:0 0 15px rgba(124,58,237,.4);
}
  
</style>

</head>

<body>

<div class="container">

<div class="logo">🎙️</div>

<h1>Raza Voice Studio AI</h1>

<p class="tag">

Convert Text into Natural Speech Instantly

</p>

<div class="hero">

<h2>Welcome 👋</h2>

<p>

Professional AI Text to Speech Tool

Fast • Beautiful • Free

</p>

</div>

<div class="start">

<button>

🚀 Start Now

</button>

</div>

<div style="margin-top:25px;">

<textarea
id="text"
placeholder="Type or paste your text here..."
style="
width:100%;
height:180px;
padding:15px;
font-size:18px;
border-radius:15px;
border:2px solid #2563EB;
outline:none;
resize:none;
"></textarea>

<p id="count"
style="
margin-top:10px;
font-weight:bold;
color:#555;
">
0 Characters
</p>

</div>
  
</div>

<script>
const txt=document.getElementById("text");
const count=document.getElementById("count");

txt.addEventListener("input",function(){
count.innerHTML=txt.value.length+" Characters";
});
</script>
  
</body>
</html>
