<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Text to PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
color:#007bff;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:350px;
resize:vertical;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#007bff;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#0056cc;
}
</style>
</head>

<body>

<div class="container">

<h2>📝 Professional Text to PDF</h2>

<label>PDF File Name</label>
<input type="text" id="pdfName" placeholder="Example: My Notes">

<label>Font Size</label>

<select id="fontSize">
<option value="12">12</option>
<option value="14" selected>14</option>
<option value="16">16</option>
<option value="18">18</option>
<option value="20">20</option>
</select>

<label>Enter Text</label>

<textarea id="text"></textarea>

<button onclick="createPDF()">
📄 Convert To PDF
</button>

<script>

async function createPDF(){

const text=document.getElementById("text").value.trim();

if(text===""){
alert("Please enter some text.");
return;
}

const fileName=document.getElementById("pdfName").value.trim() || "Document";

const fontSize=parseInt(document.getElementById("fontSize").value);

const { jsPDF }=window.jspdf;

const pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
});

pdf.setFont("helvetica","normal");
pdf.setFontSize(fontSize);

const pageWidth=190;
const pageHeight=277;

const lines=pdf.splitTextToSize(text,pageWidth);

let y=15;

for(let i=0;i<lines.length;i++){

if(y>pageHeight){

pdf.addPage();

y=15;

}

pdf.text(lines[i],10,y);

y+=fontSize*0.5;

}

pdf.save(fileName + ".pdf");

}

</script>

</div>

</body>
</html>
