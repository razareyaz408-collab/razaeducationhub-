<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Text to PDF Converter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#2563eb,#7c3aed);

min-height:100vh;

padding:25px;

}

.container{

max-width:900px;

margin:auto;

background:#fff;

border-radius:20px;

padding:25px;

box-shadow:0 20px 45px rgba(0,0,0,.20);

}

h1{

text-align:center;

font-size:32px;

color:#2563eb;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:25px;

}

label{

display:block;

font-weight:600;

margin-top:18px;

margin-bottom:8px;

}

input,
select,
textarea{

width:100%;

padding:14px;

font-size:16px;

border:2px solid #ddd;

border-radius:12px;

outline:none;

transition:.3s;

}

input:focus,
select:focus,
textarea:focus{

border-color:#2563eb;

box-shadow:0 0 12px rgba(37,99,235,.25);

}

textarea{

height:340px;

resize:vertical;

line-height:1.8;

}

button{

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:600;

}

</style>

</head>

<body>

<div class="container">

<h1>📝 Professional Text to PDF</h1>

<p class="subtitle">

Create beautiful PDF documents instantly.

</p>

<label>PDF File Name</label>

<input
type="text"
id="pdfName"
placeholder="Example: My Notes">

<label>Font Size</label>

<select id="fontSize">

<option value="12">12 px</option>

<option value="14" selected>14 px</option>

<option value="16">16 px</option>

<option value="18">18 px</option>

<option value="20">20 px</option>

<option value="24">24 px</option>

</select>

<label>Font Family</label>

<select id="fontFamily">

<option value="helvetica">Helvetica</option>

<option value="times">Times New Roman</option>

<option value="courier">Courier</option>

</select>

<label>Write Your Text</label>

<textarea
id="text"
placeholder="Write or paste your text here..."></textarea>

<div id="counter" style="margin-top:10px;text-align:right;color:#666;font-size:14px;">

Words: <span id="words">0</span>

|

Characters: <span id="chars">0</span>

</div>

<div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">

<button
id="downloadBtn"
style="flex:1;background:#2563eb;color:white;"
onclick="downloadPDF()">

📄 Download PDF

</button>

<button
style="flex:1;background:#dc2626;color:white;"
onclick="clearText()">

🗑 Clear

</button>

<button
style="flex:1;background:#16a34a;color:white;"
onclick="toggleDarkMode()">

🌙 Dark Mode

</button>

</div>

<div
id="preview"
style="margin-top:25px;padding:20px;border:2px dashed #2563eb;border-radius:15px;background:#f8fafc;min-height:180px;white-space:pre-wrap;line-height:1.8;">

Live Preview...

</div>

<script>

const textBox = document.getElementById("text");
const preview = document.getElementById("preview");
const words = document.getElementById("words");
const chars = document.getElementById("chars");

let darkMode = false;

function updatePreview() {

    const text = textBox.value;

    preview.textContent = text || "Live Preview...";

    chars.textContent = text.length;

    const count = text.trim() === ""
        ? 0
        : text.trim().split(/\s+/).length;

    words.textContent = count;

}

textBox.addEventListener("input", updatePreview);

function clearText() {

    if(confirm("Clear all text?")){

        textBox.value = "";

        updatePreview();

    }

}

function toggleDarkMode(){

    darkMode = !darkMode;

    if(darkMode){

        document.body.style.background="#111827";

        document.querySelector(".container").style.background="#1f2937";

        document.querySelector(".container").style.color="#ffffff";

        preview.style.background="#111827";

        preview.style.color="#ffffff";

    }else{

        document.body.style.background=
        "linear-gradient(135deg,#2563eb,#7c3aed)";

        document.querySelector(".container").style.background="#ffffff";

        document.querySelector(".container").style.color="#000000";

        preview.style.background="#f8fafc";

        preview.style.color="#000000";

    }

}

updatePreview();

async function downloadPDF() {

    const text = textBox.value.trim();

    if (!text) {
        alert("Please write some text first!");
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4"
    });

    const fileName =
        document.getElementById("pdfName").value.trim() || "Document";

    const fontSize =
        parseInt(document.getElementById("fontSize").value);

    const fontFamily =
        document.getElementById("fontFamily").value;

    doc.setFont(fontFamily, "normal");
    doc.setFontSize(fontSize);

    const margin = 15;
    const pageWidth = 180;
    const pageHeight = 280;
    const lineHeight = fontSize * 0.45;

    // Header
    doc.setFontSize(18);
    doc.setFont(fontFamily, "bold");
    doc.text(fileName, margin, 15);

    doc.line(15, 18, 195, 18);

    doc.setFont(fontFamily, "normal");
    doc.setFontSize(fontSize);

    const lines = doc.splitTextToSize(text, pageWidth);

    let y = 28;

    for (let i = 0; i < lines.length; i++) {

        if (y > pageHeight) {

            doc.addPage();

            doc.setFontSize(18);
            doc.setFont(fontFamily, "bold");
            doc.text(fileName, margin, 15);
            doc.line(15, 18, 195, 18);

            doc.setFont(fontFamily, "normal");
            doc.setFontSize(fontSize);

            y = 28;
        }

        doc.text(lines[i], margin, y);

        y += lineHeight;
    }

    const totalPages = doc.getNumberOfPages();

    for (let i = 1; i <= totalPages; i++) {

        doc.setPage(i);

        doc.setFontSize(10);

        doc.line(15, 287, 195, 287);

        doc.text(
            "Generated by Raza Education Hub",
            15,
            292
        );

        doc.text(
            "Page " + i + " of " + totalPages,
            170,
            292
        );

    }

    doc.save(fileName + ".pdf");

}

// ===== Auto Save =====

setInterval(function(){

    localStorage.setItem(
        "pdf_text",
        textBox.value
    );

    localStorage.setItem(
        "pdf_name",
        document.getElementById("pdfName").value
    );

},1000);

// ===== Auto Restore =====

window.onload=function(){

    const savedText=
    localStorage.getItem("pdf_text");

    const savedName=
    localStorage.getItem("pdf_name");

    if(savedText){

        textBox.value=savedText;

    }

    if(savedName){

        document.getElementById("pdfName").value=savedName;

    }

    updatePreview();

};

// ===== Watermark =====

function addWatermark(doc){

    doc.setTextColor(235);

    doc.setFontSize(40);

    doc.text(
        "RAZA EDUCATION HUB",
        28,
        165,
        {
            angle:45
        }
    );

    doc.setTextColor(0);

}

// ===== Current Date =====

function getCurrentDate(){

    return new Date().toLocaleString();

}

</script>

</div>

</body>

</html>
