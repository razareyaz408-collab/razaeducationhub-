<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

input[type=file]{
width:100%;
margin-bottom:20px;
}

.preview{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.preview img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
border:2px solid #ddd;
}

button{
width:100%;
padding:14px;
background:#0066ff;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#004dcc;
}
</style>
</head>

<body>

<div class="container">

<h2 id="pdfTitle">📷 Professional Image to PDF</h2>

<label>PDF Title</label>

<input
type="text"
id="pdfTitleInput"
placeholder="Enter PDF Title">
  
<input
type="file"
id="images"
accept="image/*"
multiple>

<div class="preview" id="preview"></div>

<button onclick="createPDF()">
📄 Convert to PDF
</button>

</div>

<script>

let imageFiles=[];

document.getElementById("images").addEventListener("change",function(){

imageFiles=[...this.files];

const preview=document.getElementById("preview");

preview.innerHTML="";

imageFiles.forEach(file=>{

const reader=new FileReader();

reader.onload=e=>{

preview.innerHTML+=
`<img src="${e.target.result}">`;

};

reader.readAsDataURL(file);

});

});

async function createPDF(){

if(imageFiles.length===0){
alert("Please select one or more images.");
return;
}

const pdfTitle = document.getElementById("pdfTitleInput").value.trim();  
  
const { jsPDF } = window.jspdf;

const pdf = new jsPDF("p","mm","a4");

if(pdfTitle){
  pdf.setFontSize(20);
  pdf.setFont(undefined,"bold");
  pdf.text(pdfTitle,105,20,{align:"center"});
  pdf.addPage();
}
  
for(let i=0;i<imageFiles.length;i++){

const file=imageFiles[i];

const data=await new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>resolve(e.target.result);

reader.readAsDataURL(file);

});

if(i>0){
pdf.addPage();
}

const img=new Image();

await new Promise(resolve=>{

img.onload=resolve;

img.src=data;

});

const pageWidth=210;
const pageHeight=297;

let width=pageWidth-20;
let height=(img.height/img.width)*width;

if(height>pageHeight-20){
height=pageHeight-20;
width=(img.width/img.height)*height;
}

const x=(pageWidth-width)/2;
const y=(pageHeight-height)/2;

pdf.addImage(data,"JPEG",x,y,width,height);

}

const totalPages = pdf.getNumberOfPages();

for (let i = 1; i <= totalPages; i++) {
  pdf.setPage(i);

  pdf.setDrawColor(180);
  pdf.line(15, 287, 195, 287);

  pdf.setFontSize(10);
  pdf.setTextColor(0);

  pdf.text(
    "Page " + i + " of " + totalPages,
    105,
    293,
    { align: "center" }
  );

  pdf.text(
    "Created by Raza Education Hub",
    195,
    293,
    { align: "right" }
  );
}  
  
pdf.save("Images_to_PDF.pdf");

}

</script>

</body>
</html>
