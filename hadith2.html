<h2>Arabic</h2>

<p>
الدِّينُ النَّصِيحَةُ
</p>

<h2>Tarjuma</h2>

<p>
"Deen khair-khwahi (sincere naseehat) ka naam hai."
</p>

<h2>Aasan Samajh</h2>

<p>
Ek Musalman ko Allah, uske Rasool ﷺ aur dusre Musalmanon ke liye sachchi khair-khwahi aur bhalai chahni chahiye.
</p>

<h2>Hawala</h2>

<p>
📚 Sahih Muslim: Hadith 55
</p>
